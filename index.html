<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Stylenova</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<img src="Logo.png" class="company-logo">

<!-- Screen 1 -->
<section id="screen1" class="screen active">
  <div class="card start-card">
    <img src="logostylenova.png" class="main-logo">
    <p>Smart Fitting Experience</p>
    <button onclick="goTo(2)">Start Experience</button>
  </div>
</section>

<!-- Screen 2 -->
<section id="screen2" class="screen">
  <div class="card">
    <h2>Smart Scan</h2>
    <video id="video" autoplay playsinline></video>
    <p id="camStatus">Allow camera access</p>
    <button onclick="startCamera()">Start Camera</button>
    <button onclick="analyze()">Analyze My Outfit</button>
  </div>
</section>

<!-- Screen 3 -->
<section id="screen3" class="screen">
  <div class="card">
    <h2>Analyzing...</h2>
    <div class="loader"></div>
    <p>AI is detecting your style</p>
  </div>
</section>

<!-- Screen 4: AI Preview -->
<section id="screen4" class="screen">
  <div class="result-card">
    <h2>Your AI Styled Look</h2>
    <img id="aiPreview" class="ai-preview">
    <button onclick="goToProducts()">See Recommended Products</button>
  </div>
</section>

<!-- Screen 5 -->
<section id="screen5" class="screen">
  <div class="result-card">
    <h2 id="styleTitle"></h2>
    <p id="aiMessage"></p>
    <div id="products" class="products-grid"></div>
    <button onclick="resetApp()">Try Again</button>
  </div>
</section>

<script src="script.js"></script>
<footer class="footer">
  <p>© 2026 Mindset Team. All Rights Reserved.</p>
</footer>
</body>
</html>
